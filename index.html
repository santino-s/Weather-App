<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Weather App</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="d-flex align-items-center justify-content-center min-vh-100">


        <div class="container-xl">
            <h1 class="display-3 mb-5 mt-3 text-center text-light" id="header">Weather App</h1>

            <div class="input-group mb-4">
                <button class="btn btn-outline-light active" type="button" id="celsiusBtn">C°</button>
                <button class="btn btn-outline-light" type="button" id="fahrenheitBtn">F°</button>
                <input type="text" class="form-control" id="searchBar" placeholder="Location..." aria-label="Location" aria-describedby="button-addon2">
                <button class="btn btn-outline-light" type="button" id="button-addon2"><i class="bi bi-geo"></i>Search</button>
            </div>

            <div class="card border mb-5 text-center mx-auto" style="max-width: 30rem" id="card">
                <img src="https://api.iconify.design/meteocons:clear-day-fill.svg" class="card-img-top" id="weatherImage" alt="An image of the sun." style="height: 400px; object-fit: cover;">
                <div class="card-body bg-transparent pt-0 pb-4 d-flex flex-column align-items-center justify-content-center gap-0">
                    <h3 class="card-title m-0 pb-1 w-100 text-center text-light" id="currentLocation">--Your City--</h3>
                    <h1 class="card-text m-0 py-2 w-100 text-center text-light" id="currentTemp">--°</h1>
                    <h5 class="card-text m-0 pt-1 w-100 text-center text-light" id="currentCode"></h5>
                </div>
                <div class="card-footer bg-transparent">
                    <small class="text-light" id="currentHigh">High /</small>
                    <small class="text-light" id="currentLow">Low</small>
                </div>
            </div>
        </div>
        


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="app.js"></script>
    </body>
</html>
